<!--
  Sticky table of contents (Added by SourLemonJuice, collaborated with Claude Code).
  Rendered into the left gutter beside the centered article on wide viewports.
  Built client-side from the headings inside `.post-content`. Hidden until the
  script finds at least two headings, so short posts get no TOC.
  Authors opt out per-post with `toc: false` in the front matter.
-->
<aside class="post-toc" aria-label="Table of contents" hidden>
  <p class="post-toc-title">In this page</p>
  <nav class="post-toc-nav"></nav>
</aside>

<script>
  (function () {
    // The include sits before <article>, so defer until the post content is
    // parsed before scanning for headings.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", build);
    } else {
      build();
    }

  function build() {
    var aside = document.querySelector(".post-toc");
    var nav = aside && aside.querySelector(".post-toc-nav");
    var content = document.querySelector(".post-content");
    if (!aside || !nav || !content) return;

    var headings = content.querySelectorAll("h2, h3, h4");
    if (headings.length < 2) return; // not worth a TOC

    // Fallback slugifier for the rare heading kramdown left without an id.
    var used = {};
    function slugify(text) {
      var base = text.toString()
        // 1. Normalize diacritics (e.g., split 'é' into 'e' + '´')
        .normalize('NFD')
        // 2. Remove the standalone diacritic marks
        .replace(/[\u0300-\u036f]/g, '')
        // 3. Lowercase the string
        .toLowerCase()
        // 4. Keep only unicode letters, numbers, spaces, and hyphens
        .replace(/[^\p{L}\p{N}\s\-]/gu, '')
        // 5. Replace one or more spaces with a single hyphen
        .replace(/\s+/g, '-')
        // 6. Collapse multiple consecutive hyphens into one
        .replace(/\-+/g, '-')
        // 7. Trim leading/trailing whitespace or hyphens
        .replace(/^\s+|\s+$|^\-+|\-+$/g, '') ||
        // 8. Fallback if the string becomes empty (e.g., it was just emojis)
        'section';
      var slug = base, i = 1;
      while (used[slug] || document.getElementById(slug)) { slug = base + "-" + i++; }
      used[slug] = true;
      return slug;
    }

    var list = document.createElement("ul");
    var linkByliId = {};
    headings.forEach(function (heading) {
      if (!heading.id) heading.id = slugify(heading.textContent);

      var item = document.createElement("li");
      item.className = "toc-item toc-" + heading.tagName.toLowerCase();

      var link = document.createElement("a");
      link.href = "#" + heading.id;
      link.textContent = heading.textContent;
      link.className = "toc-link";

      item.appendChild(link);
      list.appendChild(item);
      linkByliId[heading.id] = link;
    });

    nav.appendChild(list);
    aside.hidden = false;

    // Scroll-spy: highlight the heading currently nearest the top of the view.
    if ("IntersectionObserver" in window) {
      var active = null;
      function setActive(link) {
        if (active === link) return;
        if (active) active.classList.remove("is-active");
        active = link;
        if (active) active.classList.add("is-active");
      }

      var visible = {};
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) visible[entry.target.id] = true;
          else delete visible[entry.target.id];
        });
        // Pick the first heading (document order) that is currently on screen.
        for (var i = 0; i < headings.length; i++) {
          if (visible[headings[i].id]) { setActive(linkByliId[headings[i].id]); return; }
        }
      }, {
        // Account for the 61px fixed header; trigger a bit before the heading
        // reaches the very top so the active item updates naturally.
        rootMargin: "-61px 0px -70% 0px",
        threshold: 0
      });

      headings.forEach(function (heading) { observer.observe(heading); });
    }
  }
  })();
</script>
